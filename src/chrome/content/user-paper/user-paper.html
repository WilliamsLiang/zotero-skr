<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title data-l10n-id="skr-multi-user-page"></title>
    <link href="../css/cloudflare.min.css" rel="stylesheet">
    <!-- <link href="../css/font-awesome.min.css" rel="stylesheet"> -->
    <link rel="localization" href="smart-knowledge-review.ftl" />
    <script src="../js/switch-module.js"></script>
    <script src="../js/marked.min.js"></script>
    <!-- 确保访问Zotero的核心功能 -->
    <script src="chrome://zotero/content/include.js"></script>
    <script src="user-paper-data.js"></script>
    <style>
        /* 自定义样式 */
        .font-display { font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

        .tab-bar {
            border-bottom: 1px solid #E2E8F0;
            margin-bottom: 24px;
            background: transparent;
            box-shadow: none;
        }
        .tab-btn {
            font-weight: 500;
            color: #64748B;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            background: transparent;
        }
        .tab-btn:hover {
            color: #0F172A;
            background: transparent;
        }
        .tab-btn.active {
            color: #312E81;
            border-bottom: 2px solid #312E81;
            background: transparent;
        }

        .page {
            display: none;
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            box-shadow: none;
        }
        .page.active {
            display: block;
        }

        .btn-primary {
            background-color: #312E81;
            color: #FFFFFF;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #1E1B4B;
            transform: translateY(-1px);
        }

        .form-control {
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            background-color: #FFFFFF;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #312E81;
            box-shadow: 0 0 0 3px rgba(49, 46, 129, 0.1);
        }

        /* Manuscript Result Panel */
        .result-panel {
            background-color: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-left: 3px solid #312E81;
            border-radius: 2px;
            padding: 32px 40px;
        }
        .result-panel h1, .result-panel h2, .result-panel h3 {
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
            color: #0F172A;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .result-panel p {
            line-height: 1.7;
            color: #334155;
            margin-bottom: 1.2em;
        }
        
        select {
            background-color: white !important;
            -moz-appearance: none !important;
            -webkit-appearance: none !important;
            appearance: none !important;
            position: relative;
            z-index: 50;
        }
        .result-container {
            max-width: 100%;
            overflow-x: auto;
            word-wrap: break-word;
            box-sizing: border-box;
        }

        /* 限制 code 块的表现 */
        .result-container pre {
            white-space: pre-wrap;  /* 允许换行 */
            word-break: break-word; /* 处理长单词或术语 */
            overflow-x: auto;
            background-color: #F8FAFC;
            padding: 1.5em;
            border: 1px solid #E2E8F0;
            border-radius: 4px;
            max-width: 100%;
            box-sizing: border-box;
        }

        .result-container code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.9em;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans antialiased">
    <nav class="tab-bar flex px-4">
        <button class="tab-btn active py-3 px-6 transition-colors duration-300" data-page="library" data-l10n-id="skr-user-paper-by-selected"></button>
        <button class="tab-btn py-3 px-6 transition-colors duration-300" data-page="dialogue" data-l10n-id="skr-user-paper-by-query"></button>
    </nav>
    <div class="container mx-auto px-4 mb-4 flex items-center justify-end gap-2">
        <label for="global-bib-format-selector" class="text-sm font-medium text-slate-600" data-l10n-id="smart-knowledge-review-copy-bibliography"></label>
        <select id="global-bib-format-selector" class="form-control p-2 text-sm min-w-[200px] cursor-pointer">
        </select>
    </div>
    <div class="page-container container mx-auto px-4 pb-8">
        <!-- 已选论文综述生成页面 -->
        <div id="library" class="page active p-6 mb-4">
            <div class="mb-8">
                <h1 class="text-2xl font-bold mb-6 font-display text-slate-900 border-b border-slate-200 pb-2" data-l10n-id="skr-user-paper-list"></h1>
                <div id="list-container-review" class="space-y-3"></div>
            </div>
            <!-- 标题 -->
            <h2 class="text-xl font-bold text-slate-900 mb-4 font-display" data-l10n-id="skr-general-review-demand"></h2>
            <!-- 文本输入区 -->
            <textarea id="demand-review-by-paper" class="w-full form-control p-4 resize-y mb-6 min-h-[120px] text-slate-800 leading-relaxed" data-l10n-id="skr-user-paper-by-description"></textarea>
            <!-- 语言选择、下拉框、提交按钮同一行 -->
            <div class="flex items-center space-x-4 mb-8">
                <!-- 标签 -->
                <label for="language-select" class="text-sm text-slate-600 whitespace-nowrap" data-l10n-id="skr-general-language-setting"></label>
                <!-- 下拉选择 -->
                <select id="language-select" class="form-control p-2">
                    <option value="en-US">English</option>
                    <option value="zh-CN">中文</option>
                </select>
                <!-- 提交按钮 -->
                <button id="review-by-paper" class="ml-auto btn-primary py-2 px-6 rounded-md shadow-sm" data-l10n-id="skr-user-paper-by-submit"></button>
            </div>
            <div id="result-review-by-paper" class="result-panel result-container min-h-[100px]"></div>
        </div>
        <!-- 根据检索式生成页面 -->
        <div id="dialogue" class="page p-6 mb-4">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 font-display border-b border-slate-200 pb-2" data-l10n-id="skr-user-paper-by-query"></h2>
            <div class="mb-8">
                <h3 class="text-xl font-bold mb-4 font-display text-slate-800" data-l10n-id="skr-user-paper-list"></h3>
                <div id="list-container-retrieval" class="space-y-3"></div>
            </div>
            <!-- 文献检索条件 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="relative z-50">
                    <label for="language" class="block text-sm font-medium text-slate-600 mb-2" data-l10n-id="skr-general-language-setting"></label>
                    <select id="language" class="w-full form-control p-3 relative z-50">
                        <option value="en-US">English</option>
                        <option value="zh-CN">中文</option>
                    </select>
                </div>
                <div class="relative z-50">
                    <label for="databaseType" class="block text-sm font-medium text-slate-600 mb-2" data-l10n-id="skr-general-database-setting"></label>
                    <select id="databaseType" class="w-full form-control p-3 relative z-50">
                    </select>
                </div>
            </div>
            <!-- 生成要求 -->
            <div class="mb-8">
                <label for="demand-retrieval-by-paper" class="block text-sm font-medium text-slate-600 mb-2" data-l10n-id="skr-general-retrieval-demand"></label>
                <div class="relative">
                    <textarea id="demand-retrieval-by-paper" class="w-full form-control p-4 resize-y text-slate-800 leading-relaxed" rows="4" data-l10n-id="skr-user-paper-by-description" ></textarea>
                </div>
            </div>
            <!-- 提交按钮 -->
            <div class="flex justify-center mb-8">
                <button id="retrieval-by-paper" class="btn-primary py-3 px-10 rounded-md shadow-sm text-base" data-l10n-id="skr-user-paper-by-submit"></button>
            </div>
            <!-- 结果面板 -->
            <div id="result-retrieval-by-paper" class="result-panel result-container min-h-[200px]">
            </div>
        </div>
    </div>
    <script>
        const tabButtons = document.querySelectorAll('.tab-btn');
        const pages = document.querySelectorAll('.page');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                const targetPageId = button.dataset.page;
                pages.forEach(page => {
                    page.classList.remove('active');
                    if (page.id === targetPageId) {
                        page.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
