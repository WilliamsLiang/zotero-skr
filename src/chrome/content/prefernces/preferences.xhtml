<vbox onload="SKR_Preferences.init()" style="height: 100%; overflow: auto; padding: 10px;">
    <!-- 本地化链接设置 -->
    <linkset>
        <html:link rel="localization" href="smart-knowledge-review.ftl"/>
    </linkset>

    <!-- 输入组部分，包含API URL、API Key和模型输入框 -->
    <groupbox style="display: flex; flex-direction: column; gap: 10px;">
        <caption label="API Configuration" data-l10n-id="prefs-tab-api" />
        
        <!-- Provider Selection Dropdown -->
        <hbox style="display: flex; align-items: center;">
            <label data-l10n-id="prefs-apiurl-provider" style="min-width: 120px; margin-right: 10px;"></label>
            <menulist id="llm-api-provider-input" preference="extensions.zotero.skr.review.apiprovider" style="flex: 1;">
                <menupopup>
                    <menuitem data-l10n-id="provider-openai" value="openai" />
                    <menuitem data-l10n-id="provider-gemini" value="gemini" />
                    <menuitem data-l10n-id="provider-anthropic" value="anthropic" />
                </menupopup>
            </menulist>
        </hbox>

        <!-- API URL输入框 -->
        <hbox style="display: flex; align-items: center;">
            <label data-l10n-id="prefs-apiurl-url" style="min-width: 120px; margin-right: 10px;"></label>
            <html:input
                type="text" 
                id="llm-api-url-input"
                preference="extensions.zotero.skr.review.apiurl"
                style="flex: 1;"
            />
        </hbox>
        
        <hbox style="display: flex; align-items: center;">
            <label data-l10n-id="prefs-apiurl-final-url" style="min-width: 120px; margin-right: 10px;"></label>
            <label id="final-url" style="flex: 1; opacity: 0.7;"></label>
        </hbox>
        
        <!-- API Key输入框 -->
        <hbox style="display: flex; align-items: center;">
            <label data-l10n-id="prefs-apiurl-apikey" style="min-width: 120px; margin-right: 10px;"></label>
            <html:input
                type="password" 
                id="llm-api-key-input"
                preference="extensions.zotero.skr.review.apikey"
                style="flex: 1;"
            />
        </hbox>

        <!-- 模型输入框 -->
        <hbox style="display: flex; align-items: center;">
            <label data-l10n-id="prefs-apiurl-model" style="min-width: 120px; margin-right: 10px;"></label>
            <html:input
                type="text" 
                id="llm-api-model-input"
                preference="extensions.zotero.skr.review.model"
                style="flex: 1;"
            />
        </hbox>

        <!-- 按钮组，包含检查、重置按钮和状态标签 -->
        <hbox style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
            <!-- 检查按钮 -->
            <button 
                id="prefs-button-for-check"
                data-l10n-id="prefs-button-check"
            />
            <!-- 重置按钮 -->
            <button 
                id="prefs-button-for-reset"
                data-l10n-id="prefs-button-reset"
            />
            <!-- API请求状态标签 -->
            <label id="api-requests-status" style="flex: 1; font-weight: bold;"></label>
        </hbox>
        
        <!-- 横线分割 -->
        <html:hr style="width: 100%; border: none; border-top: 1px solid #ccc; margin: 10px 0;" />
        
        <!-- 参考文献自定义格式 -->
        <vbox style="gap: 10px;">
            <label data-l10n-id="prefs-bib-custom-title" style="font-weight: bold; font-size: 1.1em;"></label>
            
            <!-- 列表展示区 -->
            <vbox id="skr-bib-custom-list" style="gap: 5px; border: 1px solid #ddd; padding: 10px; border-radius: 4px; min-height: 50px;">
                <!-- 动态生成列表项 -->
            </vbox>
            
            <hbox style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <html:input type="text" id="skr-bib-new-name" placeholder="Name (e.g. English)" style="width: 150px; flex-shrink: 0;" />
                <menulist id="skr-bib-new-style" style="flex: 1; min-width: 0;" crop="end">
                    <menupopup id="skr-bib-style-popup"></menupopup>
                </menulist>
                <button id="skr-bib-add-btn" data-l10n-id="prefs-bib-custom-add" style="flex-shrink: 0;" />
            </hbox>
        </vbox>

    </groupbox>
</vbox>
